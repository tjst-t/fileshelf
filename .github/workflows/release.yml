name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
      COMMIT: ${{ github.sha }}
      LDFLAGS: >-
        -X github.com/tjst-t/fileshelf/internal/version.Version=${{ github.ref_name }}
        -X github.com/tjst-t/fileshelf/internal/version.Commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build server (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags "$LDFLAGS" -o bin/fileshelf-server-linux-amd64 ./cmd/server

      - name: Build helper (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags "$LDFLAGS" -o bin/fileshelf-helper-linux-amd64 ./cmd/helper

      - name: Build server (linux/arm64)
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags "$LDFLAGS" -o bin/fileshelf-server-linux-arm64 ./cmd/server

      - name: Build helper (linux/arm64)
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags "$LDFLAGS" -o bin/fileshelf-helper-linux-arm64 ./cmd/helper

      - name: Package release
        run: |
          mkdir -p release
          cp bin/fileshelf-* release/
          cp -r frontend/dist release/frontend-dist
          tar czf release/fileshelf-${{ github.ref_name }}-linux-amd64.tar.gz -C release fileshelf-server-linux-amd64 fileshelf-helper-linux-amd64 frontend-dist
          tar czf release/fileshelf-${{ github.ref_name }}-linux-arm64.tar.gz -C release fileshelf-server-linux-arm64 fileshelf-helper-linux-arm64 frontend-dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/fileshelf-${{ github.ref_name }}-linux-amd64.tar.gz
            release/fileshelf-${{ github.ref_name }}-linux-arm64.tar.gz
